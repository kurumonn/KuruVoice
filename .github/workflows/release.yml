# T-010: GitHub Actions - タグ push で Windows / macOS / Linux バイナリを自動リリース。
# T-013: CI ジョブで golden_report の絶対閾値チェックを実行する。

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ------------------------------------------------------------------
  # CI: fmt / clippy / test / golden_report 閾値チェック
  # ------------------------------------------------------------------
  ci:
    name: CI check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Install ALSA (Linux)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev pkg-config
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test
      - name: golden_report threshold check (T-013)
        run: cargo run --release --example golden_report -- --generate-fixtures
      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: target/golden_report.json

  build:
    name: build ${{ matrix.asset_name }}
    needs: ci
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: windows-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: linux-x64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: macos-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install ALSA (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare Windows signing certificate
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_BASE64)) {
            "KURUVOICE_SIGNING_ENABLED=false" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
            Write-Host "WINDOWS_CERTIFICATE_BASE64 is not set. Windows assets will be unsigned."
            exit 0
          }
          $certPath = Join-Path $env:RUNNER_TEMP "kuruvoice-signing.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))
          "KURUVOICE_SIGNING_ENABLED=true" | Out-File $env:GITHUB_ENV -Append -Encoding utf8
          "KURUVOICE_SIGNING_CERT=$certPath" | Out-File $env:GITHUB_ENV -Append -Encoding utf8

      - name: Sign Windows exe
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          KURUVOICE_SIGNING_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ($env:KURUVOICE_SIGNING_ENABLED -ne "true") {
            Write-Host "Skipping Windows exe signing."
            exit 0
          }
          .\scripts\sign-windows.ps1 -FilePath "target\${{ matrix.target }}\release\kuruvoice.exe"

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          archive="KuruVoice-${{ github.ref_name }}-${{ matrix.asset_name }}.tar.gz"
          mkdir -p dist/KuruVoice
          cp "target/${{ matrix.target }}/release/kuruvoice" dist/KuruVoice/
          cp README.md dist/KuruVoice/
          cp LICENSE dist/KuruVoice/ || true
          cp config.example.toml dist/KuruVoice/ || true
          cp -R docs dist/KuruVoice/docs
          tar czf "$archive" -C dist KuruVoice
          shasum -a 256 "$archive" > "$archive.sha256"

      - name: Package (Windows zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "KuruVoice-${{ github.ref_name }}-${{ matrix.asset_name }}.zip"
          New-Item -ItemType Directory -Force dist\KuruVoice | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\kuruvoice.exe" dist\KuruVoice\
          Copy-Item README.md dist\KuruVoice\
          Copy-Item LICENSE dist\KuruVoice\ -ErrorAction SilentlyContinue
          Copy-Item config.example.toml dist\KuruVoice\ -ErrorAction SilentlyContinue
          Copy-Item docs dist\KuruVoice\docs -Recurse
          Compress-Archive -Path dist\KuruVoice -DestinationPath $archive -Force
          $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $archive" | Out-File "$archive.sha256" -Encoding ascii

      - name: Install Inno Setup (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Package (Windows installer)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $env:KURUVOICE_VERSION = $version
          $isccCandidates = @(
            (Get-Command "ISCC.exe" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source -First 1),
            (Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe"),
            (Join-Path $env:ProgramFiles "Inno Setup 6\ISCC.exe"),
            (Join-Path $env:LOCALAPPDATA "Programs\Inno Setup 6\ISCC.exe")
          ) | Where-Object { $_ -and (Test-Path $_) }
          $iscc = $isccCandidates | Select-Object -First 1
          if (-not $iscc) {
            throw "ISCC.exe was not found."
          }
          & $iscc "installer\kuruvoice.iss"
          $installer = Get-ChildItem dist -Filter "KuruVoiceSetup-v$version-windows-x64.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "Installer was not created."
          }

      - name: Sign Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          KURUVOICE_SIGNING_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ($env:KURUVOICE_SIGNING_ENABLED -ne "true") {
            Write-Host "Skipping Windows installer signing."
            exit 0
          }
          $installer = Get-ChildItem dist -Filter "KuruVoiceSetup-*.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "Installer was not created."
          }
          .\scripts\sign-windows.ps1 -FilePath $installer.FullName

      - name: Hash Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installer = Get-ChildItem dist -Filter "KuruVoiceSetup-*.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "Installer was not created."
          }
          $hash = (Get-FileHash $installer.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $($installer.Name)" | Out-File "$($installer.FullName).sha256" -Encoding ascii

      - name: Upload Unix assets to release
        if: runner.os != 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            KuruVoice-${{ github.ref_name }}-${{ matrix.asset_name }}.tar.gz
            KuruVoice-${{ github.ref_name }}-${{ matrix.asset_name }}.tar.gz.sha256

      - name: Upload Windows assets to release
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            KuruVoice-${{ github.ref_name }}-${{ matrix.asset_name }}.zip
            KuruVoice-${{ github.ref_name }}-${{ matrix.asset_name }}.zip.sha256
            dist/KuruVoiceSetup-*.exe
            dist/KuruVoiceSetup-*.exe.sha256
